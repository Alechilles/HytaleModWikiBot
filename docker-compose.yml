services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hytale_mod_wiki_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    command: ["sh", "-lc", "node dist/scripts/migrate.js && node dist/src/index.js"]

volumes:
  postgres_data:
